<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>工担クイズ アクセスモニター</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+JP:wght@300;400;700&display=swap');
  :root{
    --bg:#0a0e1a;
    --panel:#111827;
    --border:#1e3a5f;
    --accent:#00d4ff;
    --accent2:#00ff88;
    --text:#c9d8e8;
    --dim:#4a6080;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;padding:20px;}
  h1{font-family:'Share Tech Mono',monospace;color:var(--accent);font-size:1.4rem;letter-spacing:3px;margin-bottom:4px;}
  .subtitle{color:var(--dim);font-size:0.75rem;letter-spacing:2px;margin-bottom:24px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px;}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:16px;text-align:center;}
  .card-num{font-family:'Share Tech Mono',monospace;font-size:2rem;color:var(--accent);line-height:1;}
  .card-label{font-size:0.7rem;color:var(--dim);margin-top:6px;letter-spacing:1px;}
  .section-title{font-size:0.75rem;color:var(--accent);letter-spacing:2px;margin-bottom:10px;border-bottom:1px solid var(--border);padding-bottom:6px;}
  .log-table{width:100%;border-collapse:collapse;font-size:0.78rem;}
  .log-table th{background:#0d1f35;color:var(--dim);padding:8px 10px;text-align:left;font-weight:400;letter-spacing:1px;}
  .log-table td{padding:8px 10px;border-bottom:1px solid #0d1a2a;color:var(--text);}
  .log-table tr:hover td{background:#0d1f35;}
  .badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:0.7rem;font-family:'Share Tech Mono',monospace;}
  .badge-new{background:#003322;color:var(--accent2);border:1px solid var(--accent2);}
  .badge-cache{background:#001a33;color:var(--accent);border:1px solid var(--accent);}
  .status{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--accent2);box-shadow:0 0 6px var(--accent2);margin-right:6px;animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
  .refresh-btn{background:transparent;border:1px solid var(--accent);color:var(--accent);padding:6px 16px;border-radius:4px;cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:0.8rem;letter-spacing:1px;}
  .refresh-btn:hover{background:var(--accent);color:#000;}
  .header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:10px;}
  .loading{color:var(--dim);font-family:'Share Tech Mono',monospace;font-size:0.85rem;padding:20px;text-align:center;}
  .empty{color:var(--dim);font-size:0.8rem;padding:20px;text-align:center;}
  .panel{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:16px;}
</style>
</head>
<body>

<div class="header-row">
  <div>
    <h1>⚡ ACCESS MONITOR</h1>
    <div class="subtitle"><span class="status"></span>工事担任者クイズ アクセスログ</div>
  </div>
  <button class="refresh-btn" onclick="loadLogs()">↻ 更新</button>
</div>

<div class="grid">
  <div class="card">
    <div class="card-num" id="cnt-total">-</div>
    <div class="card-label">累計アクセス</div>
  </div>
  <div class="card">
    <div class="card-num" id="cnt-today">-</div>
    <div class="card-label">今日</div>
  </div>
  <div class="card">
    <div class="card-num" id="cnt-week">-</div>
    <div class="card-label">今週</div>
  </div>
  <div class="card">
    <div class="card-num" id="cnt-new">-</div>
    <div class="card-label">新規取得</div>
  </div>
</div>

<div class="panel">
  <div class="section-title">アクセスログ（新しい順）</div>
  <div id="log-area"><div class="loading">読み込み中...</div></div>
</div>

<script>
// ── 設定（難読化済みキー） ──
const _k1 = [36,50,97,36,49,48,36,47,101,67,80,52,57,117,46,119,57,71,115,109,74,83,78,118,70,70,90,98,46,56,98,85,73,115,99,111,101,56,106,69,54,84,76,112,53,66,83,77,70,104,50,121,111,88,46,106,57,75,73,97].map(c=>String.fromCharCode(c)).join('');
const _k2 = [54,97,48,52,49,99,97,54,50,53,48,98,49,51,49,49,99,51,52,50,50,102,99,49].map(c=>String.fromCharCode(c)).join('');
const _BASE = 'https://api.jsonbin.io/v3/b';
const _LIST = `https://api.jsonbin.io/v3/c/${_k2}/bins`;

async function loadLogs(){
  document.getElementById('log-area').innerHTML='<div class="loading">読み込み中...</div>';
  try{
    // コレクション内のBin一覧を取得
    const r = await fetch(_LIST,{headers:{'X-Master-Key':_k1}});
    if(!r.ok) throw new Error('取得失敗: '+r.status);
    const res = await r.json();
    const bins = res.result || res || [];

    if(!bins||bins.length===0){
      document.getElementById('log-area').innerHTML='<div class="empty">ログがまだありません</div>';
      updateStats([]);
      return;
    }

    // 各Binの内容を取得（最新50件まで）
    const targets = bins.slice(0,50);
    const details = await Promise.all(
      targets.map(b=>{
        const binId = b.record || b.id || b;
        return fetch(`${_BASE}/${binId}`,{headers:{'X-Master-Key':_k1}})
          .then(r=>r.json())
          .catch(()=>null);
      })
    );

    const logs = details
      .filter(d=>d&&d.record)
      .map(d=>d.record)
      .sort((a,b)=>new Date(b.time)-new Date(a.time));

    updateStats(logs);
    renderTable(logs);
  }catch(e){
    document.getElementById('log-area').innerHTML=`<div class="empty">エラー: ${e.message}</div>`;
  }
}

function updateStats(logs){
  const now = new Date();
  const todayStr = now.toDateString();
  const weekAgo = new Date(now - 7*24*60*60*1000);

  const total = logs.length;
  const today = logs.filter(l=>new Date(l.time).toDateString()===todayStr).length;
  const week  = logs.filter(l=>new Date(l.time)>=weekAgo).length;
  const newDl = logs.filter(l=>l.type==='new').length;

  document.getElementById('cnt-total').textContent = total;
  document.getElementById('cnt-today').textContent = today;
  document.getElementById('cnt-week').textContent  = week;
  document.getElementById('cnt-new').textContent   = newDl;
}

function renderTable(logs){
  if(logs.length===0){
    document.getElementById('log-area').innerHTML='<div class="empty">ログがまだありません</div>';
    return;
  }
  const rows = logs.map(l=>{
    const d = new Date(l.time);
    // UTC+9に変換
    const jst = new Date(d.getTime() + 9*60*60*1000);
    const dateStr = `${jst.getUTCFullYear()}/${String(jst.getUTCMonth()+1).padStart(2,'0')}/${String(jst.getUTCDate()).padStart(2,'0')}`;
    const timeStr = `${String(jst.getUTCHours()).padStart(2,'0')}:${String(jst.getUTCMinutes()).padStart(2,'0')}`;
    const badge = l.type==='new'
      ? '<span class="badge badge-new">新規取得</span>'
      : l.type==='debug'
      ? '<span class="badge" style="background:#1a1a00;color:#ffdd00;border:1px solid #ffdd00">デバッグ</span>'
      : '<span class="badge badge-cache">キャッシュ</span>';
    const user = l.user ? `<span style="color:var(--accent2);font-weight:bold">${l.user}</span>` : '<span style="color:var(--dim)">-</span>';
    const plays = l.plays !== undefined ? l.plays+'回' : '-';
    const avg5  = l.avg5  !== null && l.avg5 !== undefined
      ? `<span style="color:${l.avg5>=60?'var(--accent2)':'#ff4466'};font-weight:bold">${l.avg5}%</span>`
      : '-';
    const scores = l.scores && l.scores.length
      ? l.scores.map(s=>`<span style="font-size:0.65rem;color:var(--dim)">${s}%</span>`).join(' ')
      : '-';
    const fp = l.fp ? `<span style="font-family:'Share Tech Mono',monospace;font-size:0.65rem;color:var(--dim)">${l.fp}</span>` : '-';
    return `<tr>
      <td>${dateStr}</td>
      <td>${timeStr}</td>
      <td>${user}</td>
      <td>${fp}</td>
      <td>${plays}</td>
      <td>${avg5}</td>
      <td>${scores}</td>
      <td>${badge}</td>
    </tr>`;
  }).join('');

  document.getElementById('log-area').innerHTML=`
    <table class="log-table">
      <thead><tr><th>日付</th><th>時刻(JST)</th><th>ユーザー</th><th>端末ID</th><th>回数</th><th>5回平均</th><th>直近スコア</th><th>種別</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// 初回読み込み
loadLogs();
// 5分おきに自動更新
setInterval(loadLogs, 5*60*1000);
</script>
</body>
</html>
